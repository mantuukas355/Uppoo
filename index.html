<!DOCTYPE html>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; font-family: 'DM Sans', sans-serif; }
    body { overflow: hidden; }

    /* scrollbar styling */
    .messages-scroll::-webkit-scrollbar { width: 4px; }
    .messages-scroll::-webkit-scrollbar-track { background: transparent; }
    .messages-scroll::-webkit-scrollbar-thumb { 
      background: rgba(100,80,180,0.2); 
      border-radius: 4px; 
    }
    .dark .messages-scroll::-webkit-scrollbar-thumb {
      background: rgba(180,80,255,0.55);
      box-shadow: 0 0 8px rgba(180,60,255,0.7);
    }

    @keyframes bounce-dot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    @keyframes share-pop {
      0% { opacity: 0; transform: translateY(-10px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes ripple-expand {
      0%   { opacity: 0.7; clip-path: circle(0% at calc(100% - 68px) 68px); }
      100% { opacity: 0; clip-path: circle(40% at calc(100% - 68px) 68px); }
    }
    .dot-1 { animation: bounce-dot 1.2s 0ms infinite; }
    .dot-2 { animation: bounce-dot 1.2s 200ms infinite; }
    .dot-3 { animation: bounce-dot 1.2s 400ms infinite; }
    .theme-smooth,
    .theme-smooth button,
    .theme-smooth span,
    .theme-smooth input,
    .theme-smooth textarea {
      transition: background-color 420ms cubic-bezier(0.22, 1, 0.36, 1), color 420ms cubic-bezier(0.22, 1, 0.36, 1), border-color 420ms cubic-bezier(0.22, 1, 0.36, 1), box-shadow 420ms cubic-bezier(0.22, 1, 0.36, 1), opacity 260ms ease, transform 420ms cubic-bezier(0.22, 1, 0.36, 1), filter 420ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    /* divs only get color/shadow transitions — NOT transform/margin — so sidebar & logo animate correctly */
    .theme-smooth div {
      transition: background-color 420ms cubic-bezier(0.22, 1, 0.36, 1), color 420ms cubic-bezier(0.22, 1, 0.36, 1), border-color 420ms cubic-bezier(0.22, 1, 0.36, 1), box-shadow 420ms cubic-bezier(0.22, 1, 0.36, 1), opacity 260ms ease, filter 420ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    .theme-wash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      animation: ripple-expand 420ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* These come AFTER theme-smooth so they override with !important */
    .sidebar-container { transition: margin-left 0.3s ease, opacity 0.3s ease !important; }
    .sidebar-hidden { margin-left: -320px; opacity: 1; }
    .logo-transition { transition: left 0.3s ease, opacity 0.3s ease !important; }
    .help-panel {
      transition: margin-right 0.42s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.32s ease !important;
      transform: none;
      filter: saturate(1);
      will-change: margin-right, opacity;
    }
    .help-panel-hidden { margin-right: -320px; opacity: 0; pointer-events: none; transform: none; filter: saturate(1); }
    .chat-area { transition: padding-right 0.42s cubic-bezier(0.22, 1, 0.36, 1) !important; }
    /* interactive hover/press styling */
    button {
      transition: background 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      outline: none;
      box-shadow: none;
    }
    button:hover:not(:disabled) {
      background: rgba(61, 58, 110, 0.22);
      box-shadow: 0 6px 18px rgba(61, 58, 110, 0.14);
    textarea::placeholder { 
      color: rgba(109, 88, 156, 0.6); 
      font-size: 18px; 
      line-height: 1.5; 
    }
    }
    button:active:not(:disabled) {
      background: rgba(61, 58, 110, 0.28);
      filter: brightness(0.95);
      box-shadow: 0 4px 10px rgba(61, 58, 110, 0.18);
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.75;
      box-shadow: none;
    }
    button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(61, 58, 110, 0.12);
    }
    .no-hover-button:hover, .no-hover-button:active {
      background: none !important;
      box-shadow: none !important;
      filter: none !important;
    }
    textarea:focus, input:focus {

</head>

// ── App ───────────────────────────────────────────────────────────────────
function App() {
  const [messages, setMessages] = useState([
    { role: "assistant", text: "Hey, I'm glad you're here. This is a safe space — no judgment, just support. How are you feeling today?" },
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [showChips, setShowChips] = useState(true);
  const [activeChat, setActiveChat] = useState(null);
  const [showSidebar, setShowSidebar] = useState(true);
  const [showShareMenu, setShowShareMenu] = useState(false);
  const [showHelpPanel, setShowHelpPanel] = useState(false);
  const [darkTheme, setDarkTheme] = useState(false);
  const [themePulse, setThemePulse] = useState(false);
  const [shareStatus, setShareStatus] = useState("");
  const messagesEndRef = useRef(null);
  const textareaRef = useRef(null);
  const shareMenuRef = useRef(null);
  const theme = darkTheme ? {
    shell: "#1f1a2d",
    panel: "#2b2439",
    panelAlt: "#342c45",
    panelSoft: "rgba(73,61,99,0.72)",
    text: "#f4efff",
    textSoft: "rgba(244,239,255,0.74)",
    textMuted: "rgba(244,239,255,0.54)",
    bubble: "#362d47",
    active: "#433659",
    hover: "#3c314f",
    input: "#2b2439",
    chip: "rgba(73,61,99,0.72)",
  } : {
    shell: "#f5f3ee",
    panel: "#ffffff",
    panelAlt: "#f5f2f8",
    panelSoft: "rgba(255,255,255,0.65)",
    text: "#3d1a6e",
    textSoft: "rgba(61,26,110,0.76)",
    textMuted: "rgba(80,40,160,0.4)",
    bubble: "#f5f2f8",
    active: "#f0eafa",
    hover: "#fbf8fd",
    input: "#ffffff",
    chip: "rgba(255,255,255,0.65)",
  };
  const surfaceText = theme.text;
  const surfaceTextSoft = theme.textSoft;
  const surfaceTextMuted = theme.textMuted;

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, loading]);

  useEffect(() => {
    function handlePointerDown(e) {
      if (shareMenuRef.current && !shareMenuRef.current.contains(e.target)) {
        setShowShareMenu(false);
      }
    }

    if (showShareMenu) document.addEventListener("mousedown", handlePointerDown);
    return () => document.removeEventListener("mousedown", handlePointerDown);
  }, [showShareMenu]);

  useEffect(() => {
    setThemePulse(true);
    const timeoutId = setTimeout(() => setThemePulse(false), 440);
    return () => clearTimeout(timeoutId);
  }, [darkTheme]);

  function send(text) {
    if (!text.trim() || loading) return;
    setShowChips(false);
    setMessages(m => [...m, { role: "user", text }]);
    setInput("");
    setLoading(true);
    if (textareaRef.current) textareaRef.current.style.height = "auto";

    // Mock reply after 1.2 s — replace this block with your real API call later
    setTimeout(() => {
      const reply = MOCK_REPLIES[mockIndex % MOCK_REPLIES.length];
      mockIndex++;
      setMessages(m => [...m, { role: "assistant", text: reply }]);
      setLoading(false);
    }, 1200);
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(input); }
  }

  function handleTextarea(e) {
    setInput(e.target.value);
    e.target.style.height = "auto";
    e.target.style.height = Math.min(e.target.scrollHeight, 80) + "px";
  }

  function resetChat() {
    setMessages([{ role: "assistant", text: "Hey, I'm glad you're here. How are you feeling today?" }]);
    mockIndex = 0;
    setShowChips(true);
    setActiveChat(null);
    setInput("");
  }

  async function copyShareLink() {
    try {
      await navigator.clipboard.writeText(window.location.href);
      setShareStatus("Link copied");
    } catch (error) {
      setShareStatus("Couldn't copy link");
    }
    setShowShareMenu(false);
    setTimeout(() => setShareStatus(""), 1800);
  }

  function openShareTarget(type) {
    const shareUrl = encodeURIComponent(window.location.href);
    const shareText = encodeURIComponent("Take a look at Uppoo");
    const targets = {
      email: `mailto:?subject=Uppoo&body=${shareText}%0A%0A${shareUrl}`,
      whatsapp: `https://wa.me/?text=${shareText}%20${shareUrl}`,
      x: `https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrl}`,
    };
    window.open(targets[type], "_blank", "noopener,noreferrer");
    setShowShareMenu(false);
  }

  return (
    <div className={`theme-smooth${darkTheme ? " dark" : ""}`} style={{ display:"flex", height:"100vh", background: theme.shell, fontFamily:"'DM Sans',sans-serif", overflow:"hidden", position:"relative" }}>
      {themePulse && (
        <div className="theme-wash" style={{ background: darkTheme
          ? "linear-gradient(to top left,#0e0a1a 0%,#1a1330 30%,#2e2248 62%,#3d2f60 100%)"
          : "linear-gradient(to bottom right,#ede6fa 0%,#ddd4f5 28%,#cbbfee 58%,#b8a8e8 100%)"
        }} />
      )}

      {/* Menu toggle button - fixed position */}
      <div style={{ position:"fixed", left:24, top:28, display:"flex", flexDirection:"column", gap:18, zIndex:10 }}>
        <button className="no-hover-button" onClick={() => setShowSidebar(!showSidebar)} style={{ width:28, height:28, background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", padding:0 }}>
          <MenuIcon open={showSidebar} color={theme.text} />
        </button>
        <button className="no-hover-button" onClick={resetChat} style={{ width:28, height:28, background:"none", border:"none", cursor:"pointer", padding:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <PlusIcon color={theme.text} />
        </button>
        <button className="no-hover-button" style={{ width:28, height:28, background:"none", border:"none", cursor:"pointer", padding:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <SearchIcon color={theme.text} />
        </button>
      </div>

      {/* ── Sidebar ── */}
      <div className={`sidebar-container ${!showSidebar ? 'sidebar-hidden' : ''}`} style={{ width:320, flexShrink:0, background:theme.panel, display:"flex", flexDirection:"column", paddingTop:30, paddingBottom:16, boxShadow: darkTheme ? "8px 0 28px rgba(160,60,255,0.10)" : "0 12px 34px rgba(80,40,140,0.19)", zIndex:2 }}>

        <div style={{ height:20 }} />

        <div style={{ padding:"0 12px 12px" }}>
          <div onClick={resetChat} style={{ margin:"16px 0 0", minHeight:46, padding:"0 16px 0 44px", display:"flex", alignItems:"center", gap:10, fontSize:17, color:surfaceText, fontWeight:400, borderRadius:999, background: activeChat === null ? theme.active : "transparent", cursor:"pointer", overflow:"hidden" }}>
            <span>New chat</span>
          </div>
          <div style={{ width:"100%", background:"transparent", border:"none", borderRadius:20, padding:"0 18px 0 46px", minHeight:44, marginTop:0, display:"flex", alignItems:"center", gap:10, overflow:"hidden" }}>
            <input type="text" placeholder="Search" style={{ width:"100%", background:"transparent", border:"none", fontSize:16, color:surfaceTextMuted, outline:"none", fontFamily:"inherit" }} />
          </div>
        </div>

        <div style={{ fontSize:14, fontWeight:600, letterSpacing:"0.08em", color:surfaceTextMuted, textTransform:"uppercase", padding:"6px 16px 4px" }}>Chats</div>

        {HISTORY_ITEMS.map((item, i) => (
          <div key={i} onClick={() => setActiveChat(i)} style={{ margin:"4px 8px", minHeight:46, padding:"0 16px", display:"flex", alignItems:"center", fontSize:17, color:surfaceText, borderRadius:999, cursor:"pointer", background: activeChat===i ? theme.active : "transparent", fontWeight:400, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}
            onMouseOver={e => { if(activeChat!==i) e.currentTarget.style.background=theme.hover; }}
            onMouseOut={e => { if(activeChat!==i) e.currentTarget.style.background="transparent"; }}
          >{item}</div>
        ))}

        <div style={{ position:"fixed", left:22, bottom:24, display:"flex", alignItems:"center", gap:10, zIndex:10 }}>
          <div style={{ width:32, height:32, borderRadius:"50%", overflow:"hidden", flexShrink:0, background:"transparent" }}>
            <img src={ICON_URL} alt="Uppoo icon" style={{ width:"100%", height:"100%", objectFit:"cover" }} />
          </div>
          <span style={{ fontSize:15, color:surfaceText, display: showSidebar ? "inline" : "none" }}>info@uppoo.nl</span>
        </div>
      </div>

      {/* ── Chat area ── */}
      <div className="chat-area" style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", paddingRight: showHelpPanel ? 320 : 0, background: darkTheme ? "linear-gradient(to top left,#0e0a1a 0%,#1a1330 30%,#2e2248 62%,#3d2f60 100%)" : "linear-gradient(to bottom right,#ede6fa 0%,#ddd4f5 28%,#cbbfee 58%,#b8a8e8 100%)" }}>

        {/* Fixed logo and buttons */}
        <img className="logo-transition" src={LOGO_URL} alt="Uppoo" onClick={resetChat} style={{ position:"fixed", left: showSidebar ? 340 : 88, top:20, height:96, objectFit:"contain", cursor:"pointer", zIndex:10 }} />
        <div style={{ position:"fixed", right:20, top:20, display:"flex", gap:18, zIndex:10 }}>
          <button onClick={() => setDarkTheme(v => !v)} style={{ width:48, height:48, borderRadius:"50%", background:"none", border:"none", cursor:"pointer", padding:0, display:"flex", alignItems:"center", justifyContent:"center" }}><ThemeIcon dark={darkTheme} color={theme.text} /></button>
          <div ref={shareMenuRef} style={{ position:"relative" }}>
            <button onClick={() => setShowShareMenu(v => !v)} style={{ width:48, height:48, borderRadius:"50%", background:"none", border:"none", cursor:"pointer", padding:0, display:"flex", alignItems:"center", justifyContent:"center" }}><UploadIcon open={showShareMenu} color={theme.text} /></button>
            {showShareMenu && (
              <div style={{ position:"absolute", top:56, right:0, width:224, padding:"10px", borderRadius:18, background:theme.panelAlt, boxShadow:"0 16px 40px rgba(80,40,140,0.24)", display:"flex", flexDirection:"column", gap:6, transformOrigin:"top right", animation:"share-pop 220ms cubic-bezier(0.22, 1, 0.36, 1)" }}>
                <button onClick={copyShareLink} style={{ width:"100%", minHeight:40, borderRadius:999, background:"transparent", border:"none", cursor:"pointer", padding:"0 14px", display:"flex", alignItems:"center", gap:10, color:surfaceText, fontSize:15, fontFamily:"inherit" }} onMouseOver={e => e.currentTarget.style.background=theme.hover} onMouseOut={e => e.currentTarget.style.background="transparent"}><LinkIcon color={surfaceText} /><span>Copy link</span></button>
                <button onClick={() => openShareTarget("email")} style={{ width:"100%", minHeight:40, borderRadius:999, background:"transparent", border:"none", cursor:"pointer", padding:"0 14px", display:"flex", alignItems:"center", gap:10, color:surfaceText, fontSize:15, fontFamily:"inherit" }} onMouseOver={e => e.currentTarget.style.background=theme.hover} onMouseOut={e => e.currentTarget.style.background="transparent"}><MailIcon color={surfaceText} /><span>Share by email</span></button>
                <button onClick={() => openShareTarget("whatsapp")} style={{ width:"100%", minHeight:40, borderRadius:999, background:"transparent", border:"none", cursor:"pointer", padding:"0 14px", display:"flex", alignItems:"center", gap:10, color:surfaceText, fontSize:15, fontFamily:"inherit" }} onMouseOver={e => e.currentTarget.style.background=theme.hover} onMouseOut={e => e.currentTarget.style.background="transparent"}><WhatsAppIcon color={surfaceText} /><span>Share on WhatsApp</span></button>
                <button onClick={() => openShareTarget("x")} style={{ width:"100%", minHeight:40, borderRadius:999, background:"transparent", border:"none", cursor:"pointer", padding:"0 14px", display:"flex", alignItems:"center", gap:10, color:surfaceText, fontSize:15, fontFamily:"inherit" }} onMouseOver={e => e.currentTarget.style.background=theme.hover} onMouseOut={e => e.currentTarget.style.background="transparent"}><XIcon color={surfaceText} /><span>Share on X</span></button>
              </div>
            )}
            {shareStatus && (
              <div style={{ position:"absolute", top:188, right:0, padding:"8px 12px", borderRadius:14, background:theme.panelAlt, color:surfaceText, fontSize:14, boxShadow: darkTheme ? "0 8px 28px rgba(160,60,255,0.12)" : "0 16px 40px rgba(80,40,140,0.24)", whiteSpace:"nowrap" }}>
                {shareStatus}
              </div>
            )}
          </div>
          <button onClick={() => setShowHelpPanel(v => !v)} style={{ width:48, height:48, borderRadius:"50%", background:"none", border:"none", cursor:"pointer", padding:0, display:"flex", alignItems:"center", justifyContent:"center" }}><HelpIcon open={showHelpPanel} color={theme.text} /></button>
        </div>

        <div className={`help-panel ${!showHelpPanel ? 'help-panel-hidden' : ''}`} style={{ position:"fixed", right:0, top:0, width:"min(320px, calc(100vw - 12px))", height:"100vh", background:theme.panel, boxShadow: darkTheme ? "-8px 0 28px rgba(160,60,255,0.10)" : "0 12px 34px rgba(80,40,140,0.19)", zIndex:9, overflowY:"auto", overflowX:"hidden" }}>
          <div style={{ display:"flex", flexDirection:"column", gap:10, padding:"84px 22px 28px", minHeight:"100%" }}>
            <div style={{ padding:"0 8px" }}>
              <div style={{ fontSize:24, fontWeight:600, color:surfaceText, marginBottom:8 }}>Emergency help</div>
              <div style={{ fontSize:15, lineHeight:1.55, color:surfaceTextSoft }}>
                If your life is in immediate danger, call 112 immediately. If it is not in immediate danger but you still need help, call 113 for free or start an online chat.
              </div>
            </div>

            <div style={{ display:"grid", gap:10 }}>
              {HELP_PLACES.map((place, index) => (
                <div key={index} style={{ background:"transparent", borderRadius:20, overflow:"hidden", boxShadow:"none" }}>
                  <img src={place.image} alt={place.title} style={{ width:"100%", height:"clamp(96px, 18vh, 128px)", objectFit:"cover", display:"block" }} />
                  <div style={{ padding:"12px 14px 14px" }}>
                    <div style={{ fontSize:17, fontWeight:600, color:surfaceText, marginBottom:6 }}>{place.title}</div>
                    <div style={{ fontSize:13, lineHeight:1.55, color:surfaceTextSoft, overflowWrap:"anywhere" }}>{place.text}</div>
                  </div>
                </div>
              ))}
            </div>

            <div style={{ marginTop:"auto", background:"transparent", borderRadius:20, padding:"14px 16px", boxShadow:"none" }}>
              <div style={{ fontSize:16, fontWeight:600, color:surfaceText, marginBottom:8 }}>Quick contacts</div>
              <div style={{ fontSize:13, lineHeight:1.6, color:surfaceTextSoft, overflowWrap:"anywhere" }}>
                Immediate danger: 112<br />
                Need help now: 113<br />
                <br />
                (113 chat is anonymous and available day and night for free)
              </div>
            </div>
          </div>
        </div>

        <div style={{ maxWidth:800, margin:"0 auto", flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>

          {/* Messages */}
          <div className="messages-scroll" style={{ flex:1, overflowY:"auto", padding:"120px 24px 16px", display:"flex", flexDirection:"column", gap:16 }}>
          {messages.map((m, i) =>
            m.role === "user" ? (
              <div key={i} style={{ alignSelf:"flex-end", maxWidth:"72%" }}>
                <div style={{ background:theme.bubble, borderRadius:"18px 18px 4px 18px", padding:"16px 20px", fontSize:18, color:surfaceText, lineHeight:1.6, boxShadow: darkTheme ? "0 6px 24px rgba(160,60,255,0.12)" : "0 12px 34px rgba(80,40,140,0.19)" }}>
                  {m.text}
                </div>
              </div>
            ) : (
              <div key={i} style={{ alignSelf:"flex-start", maxWidth:"72%", display:"flex", alignItems:"flex-start", gap:10 }}>
                <div style={{ width:32, height:32, borderRadius:"50%", overflow:"hidden", flexShrink:0, marginTop:14, background:"transparent" }}>
                  <img src={ICON_URL} alt="Uppoo" style={{ width:"100%", height:"100%", objectFit:"cover" }} />
                </div>
                <div style={{ padding:"16px 20px", fontSize:18, color:theme.text, lineHeight:1.65 }}>{m.text}</div>
              </div>
            )
          )}

          {loading && (
            <div style={{ alignSelf:"flex-start", display:"flex", alignItems:"flex-start", gap:10 }}>
              <div style={{ width:32, height:32, borderRadius:"50%", overflow:"hidden", flexShrink:0, marginTop:14, background:"transparent" }}>
                <img src={ICON_URL} alt="Uppoo" style={{ width:"100%", height:"100%", objectFit:"cover" }} />
              </div>
              <div style={{ padding:"16px" }}>
                <div style={{ display:"flex", gap:4, alignItems:"center" }}>
                  <div className="dot-1" style={{ width:7, height:7, background:"#9080c0", borderRadius:"50%" }}/>
                  <div className="dot-2" style={{ width:7, height:7, background:"#9080c0", borderRadius:"50%" }}/>
                  <div className="dot-3" style={{ width:7, height:7, background:"#9080c0", borderRadius:"50%" }}/>
                </div>
              </div>
            </div>
          )}
          <div ref={messagesEndRef} />
        </div>

        {/* Chips */}
        {showChips && (
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", padding:"0 24px 12px" }}>
            {["I'm feeling anxious","I feel overwhelmed","I'm struggling to sleep","I just need to vent"].map((c, i) => (
              <button key={i} onClick={() => send(c)}
                style={{ fontSize:16, padding:"10px 18px", borderRadius:20, border:"none", cursor:"pointer", color:darkTheme ? theme.text : "#4a3a8a", background:theme.chip, fontFamily:"inherit", transition:"background 0.15s" }}
                onMouseOver={e => e.target.style.background=darkTheme ? "#5a4a78" : "rgba(255,255,255,0.9)"}
                onMouseOut={e => e.target.style.background=theme.chip}
              >{c}</button>
            ))}
          </div>
        )}

        {/* Input */}
        <div style={{ padding:"0 20px 16px" }}>
          <div style={{ background:theme.input, borderRadius:20, padding:"16px 20px", boxShadow: darkTheme ? "0 6px 24px rgba(160,60,255,0.12)" : "0 10px 24px rgba(80,40,140,0.14)" }}>
            <textarea ref={textareaRef} rows={1} placeholder="What can I help you with?" value={input} onChange={handleTextarea} onKeyDown={handleKey}
              style={{ width:"100%", border:"none", outline:"none", resize:"none", fontSize:18, fontFamily:"inherit", color:surfaceText, background:"transparent", lineHeight:1.5, maxHeight:80, minHeight:36, padding:"10px 0 2px" }}
            />
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:12 }}>
              <div style={{ display:"flex", gap:14 }}>
                <button style={{ width:42, height:42, borderRadius:"50%", border:"none", cursor:"pointer", padding:0, display:"flex", alignItems:"center", justifyContent:"center", background:"none", color: theme.text }}><ImgIcon color={theme.text} /></button>
                <button style={{ width:42, height:42, borderRadius:"50%", border:"none", cursor:"pointer", padding:0, display:"flex", alignItems:"center", justifyContent:"center", background:"none", color: theme.text }}><CodeIcon color={theme.text} /></button>
                <button style={{ width:42, height:42, borderRadius:"50%", border:"none", cursor:"pointer", padding:0, display:"flex", alignItems:"center", justifyContent:"center", background:"none", color: theme.text }}><MicIcon color={theme.text} /></button>
              </div>
                <button onClick={() => send(input)} disabled={!input.trim() || loading}
                style={{ width:42, height:42, borderRadius:"50%", background: (!input.trim()||loading) ? (darkTheme ? "#4b4166" : "#c5bfdf") : (darkTheme ? "#7364b4" : "#3d1a6e"), border:"none", cursor: (!input.trim()||loading) ? "default" : "pointer", display:"flex", alignItems:"center", justifyContent:"center", transition:"background 0.15s" }}>
                <SendIcon />
              </button>
            </div>
          </div>
        </div>

        <div onClick={() => setShowHelpPanel(true)} style={{ fontSize:16, color:theme.textMuted, textAlign:"center", paddingBottom:10, lineHeight:1.4, cursor:"pointer" }}>
          In danger? Call 112 now, or open emergency help.
        </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
